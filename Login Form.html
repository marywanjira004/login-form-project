<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
    <link rel="stylesheet" href="Style.css">
</head>
<body>
   <form action="index.php" method="post">
    <label for="username">Username</label>
    <input type="text" id="username" name="username" placeholder="sheerahmerene" minlength="6" maxlength="20" required><br>

    <label for="email">Email</label>
    <input type="email" id="email" name="email" placeholder="sheerahmerene@gmail.com" required><br>

    <label for="phonenumber">Phone Number</label>
    <input type="tel" id="phonenumber" name="phonenumber" placeholder="+254712345678" pattern="[0-9]{10}" minlength="10" required><br>

    <label for="password">Password</label>
    <input type="password" id="password" name="password"minlength="8" maxlength="15" required><br>

    <input type="reset" value="Reset"><br>
    <input type="submit" value="Submit">
   </form>
   
   <script>
       const form = document.querySelector('form');
       
       form.addEventListener('submit', function(event) {
           event.preventDefault();
           
           const username = document.getElementById('username').value;
           const email = document.getElementById('email').value;
           const phonenumber = document.getElementById('phonenumber').value;
           
           const confirmMessage = `Please confirm your information:\n\nUsername: ${username}\nEmail: ${email}\nPhone Number: ${phonenumber}\n\nDo you want to submit?`;
           
           if(confirm(confirmMessage)) {
               alert('✓ Form submitted successfully!\n\nThank you, ' + username + '!');
               
           } else {
               alert('Form submission cancelled.');
           }
       });
   </script>
</body>
</html>
